<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RunBuddy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:#111;overflow:hidden}
</style>
</head>
<body>
<div id="app"><div id="view"></div><nav id="nav"></nav></div>
<script src="/app.js"></script>
<script>
// Patch: hardcoded Strava Client ID (secret is server-side only)
const STRAVA_CLIENT_ID = '254019';
const STRAVA_REDIRECT  = 'https://runbuddy-tau.vercel.app/';

// Override strava_login to use hardcoded credentials
window.strava_login = function() {
  const url = 'https://www.strava.com/oauth/authorize'
    + '?client_id=' + STRAVA_CLIENT_ID
    + '&redirect_uri=' + encodeURIComponent(STRAVA_REDIRECT)
    + '&response_type=code'
    + '&approval_prompt=auto'
    + '&scope=activity:read_all';
  window.location.href = url;
};

// Override html_settings to hide Client ID / Secret fields
window._orig_html_settings = window.html_settings;
window.html_settings = function() {
  const s = STATE.strava;
  const connected = s && s.access_token;
  return `
    <div class="settings-section">
      <h3>Strava連携</h3>
      ${connected ? `
        <div class="strava-connected">
          <span class="badge-ok">✓ 連携済み</span>
          <p style="font-size:12px;color:#aaa;margin-top:6px;">アスリート: ${s.athlete ? s.athlete.firstname + ' ' + s.athlete.lastname : ''}</p>
          <button class="btn-secondary" onclick="strava_disconnect()" style="margin-top:10px;">連携解除</button>
        </div>
      ` : `
        <p style="color:#aaa;font-size:13px;margin-bottom:12px;">Stravaアカウントと連携して、ランニングデータを自動同期できます。</p>
        <button class="btn-primary strava-btn" onclick="strava_login()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="margin-right:6px;vertical-align:middle"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
          Stravaで連携
        </button>
      `}
    </div>
    <div class="settings-section">
      <h3>データ管理</h3>
      <button class="btn-secondary" onclick="export_data()">データをエクスポート</button>
      <button class="btn-danger" onclick="clear_data()" style="margin-top:8px;">データを全削除</button>
    </div>
  `;
};
</script>
</body>
</html>
